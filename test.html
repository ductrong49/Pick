<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bảng Điểm Pickleball</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #0f172a;
    color: white;
}
.container { padding: 10px; }

h2 {
    text-align: center;
    color: #38bdf8;
    margin: 15px 0;
}

.table-box {
    overflow-x: auto;
    margin-bottom: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: #1e293b;
    border-radius: 10px;
    overflow: hidden;
}

th, td {
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #334155;
}

th { background: #0284c7; }

tr:nth-child(even) { background: #0f172a; }

</style>
</head>

<body>

<div class="container">

<h2>🏆 Bảng A</h2>
<div class="table-box"><table id="A"></table></div>

<h2>🏆 Bảng B</h2>
<div class="table-box"><table id="B"></table></div>

<h2>🏆 Bảng C</h2>
<div class="table-box"><table id="C"></table></div>

<h2>🏆 Bảng Vớt</h2>
<div class="table-box"><table id="VOT"></table></div>

<h2>📊 Vòng bảng</h2>
<div class="table-box"><table id="BANG"></table></div>

<h2>🔥 Tứ kết</h2>
<div class="table-box"><table id="TK"></table></div>

<h2>🔥 Bán kết</h2>
<div class="table-box"><table id="BK"></table></div>

<h2>🏆 Chung kết</h2>
<div class="table-box"><table id="CK"></table></div>

</div>

<script>

const sheetID = "11R0QRVS5-tyNEXHFJh8FJ5KxlfpCWvUQkDByaIiPPGU";

function loadRange(sheet, range, tableId) {
    const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?sheet=${sheet}&range=${range}`;

    fetch(url)
    .then(res => res.text())
    .then(rep => {
        const json = JSON.parse(rep.substr(47).slice(0, -2));
        const table = document.getElementById(tableId);
        table.innerHTML = "";

        const cols = json.table.cols;
        const rows = json.table.rows;

        // header
        let header = "<tr>";
        cols.forEach(col => {
            header += `<th>${col.label || ""}</th>`;
        });
        header += "</tr>";
        table.innerHTML += header;

        // data
        rows.forEach(r => {
            let tr = "<tr>";
            r.c.forEach(c => {
                tr += `<td>${c ? c.v : ""}</td>`;
            });
            tr += "</tr>";
            table.innerHTML += tr;
        });
    })
    .catch(err => {
        document.getElementById(tableId).innerHTML = "<tr><td>Lỗi load dữ liệu</td></tr>";
    });
}

// ===== LOAD ĐÚNG RANGE =====

// Bảng A/B/C/Vot (F2:H5)
loadRange("A", "F2:H5", "A");
loadRange("B", "F2:H5", "B");
loadRange("C", "F2:H5", "C");
loadRange("Vot", "F2:H5", "VOT");

// Vòng bảng
loadRange("bang", "A1:G26", "BANG");

// Tứ kết
loadRange("1.8", "A2:E12", "TK");

// Bán kết
loadRange("bk", "A3:D7", "BK");

// Chung kết
loadRange("ck", "A3:C4", "CK");

</script>

</body>
</html>
